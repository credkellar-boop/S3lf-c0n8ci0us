name: S3lf-c0n8ci0us CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Maturin and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install maturin pytest
          pip install -r conscious_surface/requirements.txt

      - name: Build and Install Rust PyO3 Bridge
        run: |
          cd cognitive_core
          # Build a release wheel package and output it to a local 'dist' folder
          maturin build --release --out dist
          # Install the compiled wheel globally into the runner's environment
          pip install dist/*.whl

      - name: Run Python Tests
        run: |
          # Pytest will now successfully find the globally installed module
          pytest tests/
